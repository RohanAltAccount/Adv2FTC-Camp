name: FTC Streamlit Dashboard

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install streamlit flake8

          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi

      - name: Verify FTC.py exists
        run: |
          test -f FTC.py || {
            echo "Error: FTC.py was not found."
            exit 1
          }

      - name: Check Python syntax
        run: |
          python -m py_compile FTC.py

      - name: Lint FTC.py
        run: |
          flake8 FTC.py \
            --count \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics

          flake8 FTC.py \
            --count \
            --exit-zero \
            --max-complexity=10 \
            --max-line-length=127 \
            --statistics

      - name: Test Streamlit startup
        run: |
          python -m streamlit run FTC.py \
            --server.headless=true \
            --server.address=127.0.0.1 \
            --server.port=8501 &

          STREAMLIT_PID=$!

          sleep 10

          curl --fail http://127.0.0.1:8501/_stcore/health

          kill "$STREAMLIT_PID"
